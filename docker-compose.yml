version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bidpilot-postgres
    environment:
      POSTGRES_DB: bidpilot
      POSTGRES_USER: bidpilot
      POSTGRES_PASSWORD: bidpilot_secure_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bidpilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: bidpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bidpilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bidpilot-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - bidpilot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidpilot-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bidpilot:bidpilot_secure_password_change_in_prod@postgres:5432/bidpilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - bidpilot-network
    volumes:
      - ./backend:/app

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidpilot-worker
    command: celery -A app.jobs.celery_config worker -Q high_priority,default,low_priority -l info
    environment:
      DATABASE_URL: postgresql://bidpilot:bidpilot_secure_password_change_in_prod@postgres:5432/bidpilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - postgres
      - redis
      - qdrant
    networks:
      - bidpilot-network

  # Celery Beat (periodic scheduler: tender scans + deadline alerts)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidpilot-beat
    command: celery -A app.jobs.celery_config beat -l info
    environment:
      DATABASE_URL: postgresql://bidpilot:bidpilot_secure_password_change_in_prod@postgres:5432/bidpilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
      - celery-worker
    networks:
      - bidpilot-network

  # Flower (Celery Monitoring)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidpilot-flower
    command: celery -A app.jobs.celery_config flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
      - celery-worker
    networks:
      - bidpilot-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bidpilot-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_APP_NAME: BidPilot AI
    depends_on:
      - backend
    networks:
      - bidpilot-network
    volumes:
      - ./frontend:/app

networks:
  bidpilot-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
